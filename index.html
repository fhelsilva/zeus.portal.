<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>ZEUS - CONSTRUTOR UNIVERSAL</title>
</head>
<body class="bg-black text-white font-mono min-h-screen flex items-center justify-center p-6">

<div id="login-box" class="max-w-xl w-full border-2 border-blue-900 bg-[#0d1117] p-10 rounded-2xl shadow-2xl">
    <h1 class="text-4xl font-black text-blue-500 text-center italic mb-2">ZEUS SYSTEM</h1>
    <p class="text-[10px] text-green-500 text-center font-bold tracking-[0.3em] mb-8">FIREWALL 1.131 ACTIVE</p>
    
    <div class="space-y-4">
        <input type="text" id="user" placeholder="USUÁRIO" class="w-full bg-black border border-blue-900 p-4 text-center rounded outline-none focus:border-blue-400">
        <input type="password" id="pass" placeholder="CHAVE DE ACESSO" class="w-full bg-black border border-blue-900 p-4 text-center rounded outline-none focus:border-blue-400">
        
        <button onclick="entrar()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded uppercase shadow-lg">
            Autenticar e Carregar Dados
        </button>
    </div>

    <div class="mt-8 text-center border-t border-gray-800 pt-6">
        <button onclick="adm()" class="text-gray-600 hover:text-blue-500 text-[10px] font-bold underline">ACESSO DO DONO (FELIPE)</button>
    </div>
</div>

<div id="painel" class="hidden w-full max-w-6xl animate-pulse">
    <h2 class="text-3xl font-black text-blue-400 mb-8 border-b border-blue-900 pb-4 italic">SALA MESTRE: CONSTRUINDO O IMPOSSÍVEL</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <div class="bg-[#0d1117] p-6 border border-blue-900 rounded-xl">
            <h3 class="text-blue-500 font-bold mb-2">🚀 ENGENHARIA</h3>
            <p class="text-[11px] text-gray-400 italic">Motos, Naves e Estruturas Aeroespaciais.</p>
        </div>
        <div class="bg-[#0d1117] p-6 border border-blue-900 rounded-xl">
            <h3 class="text-green-500 font-bold mb-2">💊 SAÚDE</h3>
            <p class="text-[11px] text-gray-400 italic">Remédios e Doenças Psiquiátricas Mundiais.</p>
        </div>
        <div class="bg-[#0d1117] p-6 border border-blue-900 rounded-xl">
            <h3 class="text-yellow-500 font-bold mb-2">⚖️ LEIS</h3>
            <p class="text-[11px] text-gray-400 italic">Constituição Federal e Leis Internacionais.</p>
        </div>
        <div class="bg-[#0d1117] p-6 border border-blue-900 rounded-xl">
            <h3 class="text-purple-500 font-bold mb-2">⚛️ CIÊNCIA</h3>
            <p class="text-[11px] text-gray-400 italic">Física Quântica e Álgebra Linear.</p>
        </div>
    </div>
</div>

<script>
    function entrar() {
        if(document.getElementById('user').value && document.getElementById('pass').value) {
            document.getElementById('login-box').classList.add('hidden');
            document.getElementById('painel').classList.remove('hidden');
            // Cronômetro de 5 minutos
            setTimeout(() => {
                alert("TESTE FINALIZADO! Realize o PIX para liberar o Zeus permanentemente.");
                location.reload();
            }, 300000);
        } else { alert("Preencha os campos!"); }
    }
    function adm() {
        if(prompt("SENHA MESTRE:") === "adminzeus") {
            document.getElementById('login-box').classList.add('hidden');
            document.getElementById('painel').classList.remove('hidden');
        }
    }
</script>
</body>
</html>
