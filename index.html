<div id="auth-container" class="max-w-md mx-auto bg-[#0d1117] border border-blue-900 p-8 rounded-xl shadow-2xl mt-10">
    <h1 class="text-2xl font-black text-white text-center mb-2">ZEUS PORTAL</h1>
    <p class="text-[10px] text-blue-500 text-center mb-6">SISTEMA AUTOMATIZADO DE ENGENHARIA E CIÊNCIA</p>
    
    <div class="space-y-4">
        <input type="text" id="new-user" placeholder="CRIE SEU NOME DE USUÁRIO" class="w-full bg-black border border-blue-900 p-3 text-white text-center rounded">
        <input type="password" id="new-pass" placeholder="CRIE SUA SENHA" class="w-full bg-black border border-blue-900 p-3 text-white text-center rounded">
        
        <label class="text-blue-400 text-[10px] block font-bold uppercase text-center">Selecione sua Área de Trabalho:</label>
        <select id="user-area" class="w-full bg-black border border-blue-900 p-3 text-white rounded">
            <option value="Engenharia">Engenharia Civil</option>
            <option value="Calculo">Cálculo I e II</option>
            <option value="Fisica">Física Quântica</option>
            <option value="Computacao">Ciência da Computação (Hardware/IA)</option>
        </select>

        <button onclick="criarConta()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded uppercase transition-all">
            Iniciar 5 Minutos de Degustação
        </button>
    </div>

    <div class="mt-8 pt-6 border-t border-gray-800 text-center">
        <p class="text-[9px] text-gray-500 mb-4">PIX PARA LIBERAÇÃO PERMANENTE: maiconfhel23@gmail.com</p>
        <button onclick="acessoAdm()" class="text-gray-600 hover:text-blue-400 text-[10px] font-bold uppercase underline">
            Entrar como Administrador (Felipe)
        </button>
    </div>
</div>

<script>
    // Sistema de memória local para a sessão
    function criarConta() {
        const user = document.getElementById('new-user').value;
        const pass = document.getElementById('new-pass').value;
        const area = document.getElementById('user-area').value;

        if(user && pass) {
            alert("Conta criada para " + user + "! Sua área de " + area + " está liberada por 5 minutos.");
            document.getElementById('auth-container').classList.add('hidden');
            
            // Inicia o cronômetro de 5 minutos
            setTimeout(() => {
                alert("Sua degustação expirou! Realize o PIX de R$ 150,00 para liberar seu usuário permanentemente.");
                location.reload(); // Tranca tudo e volta pro início
            }, 300000); 
        } else {
            alert("Por favor, preencha todos os campos para criar seu acesso.");
        }
    }

    function acessoAdm() {
        let senha = prompt("ACESSO MESTRE DO FELIPE:");
        if(senha === "adminzeus") {
            document.getElementById('auth-container').classList.add('hidden');
            // Aqui abre a interface completa com partículas
        }
    }
</script>
