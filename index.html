<div id="lock-screen" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-[#0d1117] border border-red-600 p-8 rounded-xl text-center shadow-2xl">
        <h2 class="text-2xl font-bold text-white mb-4">DEGUSTAÇÃO ENCERRADA</h2>
        <p class="text-gray-400 mb-6">Para continuar acessando os cálculos de Engenharia e IA, realize o pagamento.</p>
        
        <div class="bg-black p-4 mb-6 rounded border border-blue-900">
            <span class="text-green-500 font-bold">VALOR: R$ 150,00</span><br>
            <span class="text-white text-xs">PIX: maiconfhel123@gmail.com</span>
        </div>

        <input type="password" id="client-key" placeholder="SUA CHAVE DE ACESSO" class="w-full bg-black border border-blue-900 p-3 text-white text-center mb-4 rounded">

<script>
    // Inicia o contador de 5 minutos assim que o site abre
    setTimeout(function() {
        document.getElementById('lock-screen').classList.remove('hidden');
    }, 300000); // 300.000 milissegundos = 5 minutos

    function liberarTotal() {
        if(document.getElementById('client-key').value === "felipe34") {
            document.getElementById('lock-screen').classList.add('hidden');
        } else { alert("Chave inválida. Envie o comprovante do Pix."); }
    }

    function acessoAdm() {
        let senha = prompt("SENHA MESTRE DO DONO:");
        if(senha === "adminzeus") {
            document.getElementById('lock-screen').classList.add('hidden');
        } else { alert("Acesso Negado."); }
    }
</script>
